    continue-on-error: ${{ matrix.experimental }}
    services:
      mysql:
        image: ${{ matrix.db }}
        ports:
          - 3306:3306
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: yes
        options: >-
          --name=mysqld
          --health-start-period=60s
          --health-cmd="command -v healthcheck.sh >/dev/null 2>&1 && healthcheck.sh --connect --innodb_initialized || mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.py }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py }}
          cache: "pip"
          cache-dependency-path: requirements_dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U tox-gh-actions
          pip install -r requirements_dev.txt
      - name: Install MySQL client
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y mysql-client
      - name: Set up MySQL
        env:
          DB: ${{ matrix.db }}
          MYSQL_USER: tester
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: test_db
          MYSQL_HOST: 0.0.0.0
          MYSQL_PORT: 3306
        run: |
          set -e
          
          case "$DB" in
            'mysql:8.0'|'mysql:8.4')
              mysql -h127.0.0.1 -uroot -e "SET GLOBAL local_infile=on"
              docker cp mysqld:/var/lib/mysql/public_key.pem "${HOME}"

              cert_dir="$(mktemp -d)"
              trap 'rm -rf "$cert_dir"' EXIT

              cat > "${cert_dir}/ca.cnf" <<'EOF'
          [ req ]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = dn
          x509_extensions = v3_ca

          [ dn ]
          CN = sqlite3-to-mysql CI CA

          [ v3_ca ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always,issuer
          basicConstraints = critical, CA:true
          keyUsage = critical, keyCertSign, cRLSign
          EOF

              cat > "${cert_dir}/server.cnf" <<'EOF'
          [ req ]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = dn

          [ dn ]
          CN = localhost

          [ v3_server ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer
          basicConstraints = critical, CA:false
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = @alt_names

          [ alt_names ]
          DNS.1 = localhost
          IP.1 = 127.0.0.1
          IP.2 = 0.0.0.0
          EOF

              cat > "${cert_dir}/client.cnf" <<'EOF'
          [ req ]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = dn

          [ dn ]
          CN = sqlite3-to-mysql CI client

          [ v3_client ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer
          basicConstraints = critical, CA:false
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = clientAuth
          EOF

              openssl req -new -x509 -days 365 -nodes -newkey rsa:2048 \
                -keyout "${cert_dir}/ca-key.pem" \
                -out "${HOME}/ca.pem" \
                -config "${cert_dir}/ca.cnf"
              openssl req -new -nodes -newkey rsa:2048 \
                -keyout "${cert_dir}/server-key.pem" \
                -out "${cert_dir}/server.csr" \
                -config "${cert_dir}/server.cnf"
              openssl x509 -req \
                -in "${cert_dir}/server.csr" \
                -CA "${HOME}/ca.pem" \
                -CAkey "${cert_dir}/ca-key.pem" \
                -CAserial "${cert_dir}/ca.srl" \
                -CAcreateserial \
                -out "${cert_dir}/server-cert.pem" \
                -days 365 \
                -sha256 \
                -extfile "${cert_dir}/server.cnf" \
                -extensions v3_server
              openssl req -new -nodes -newkey rsa:2048 \
                -keyout "${HOME}/client-key.pem" \
                -out "${cert_dir}/client.csr" \
                -config "${cert_dir}/client.cnf"
              openssl x509 -req \
                -in "${cert_dir}/client.csr" \
                -CA "${HOME}/ca.pem" \
                -CAkey "${cert_dir}/ca-key.pem" \
                -CAserial "${cert_dir}/ca.srl" \
                -CAcreateserial \
                -out "${HOME}/client-cert.pem" \
                -days 365 \
                -sha256 \
                -extfile "${cert_dir}/client.cnf" \
                -extensions v3_client

              chmod 600 "${HOME}/client-key.pem"
              docker cp "${HOME}/ca.pem" mysqld:/var/lib/mysql/ca.pem
              docker cp "${cert_dir}/server-cert.pem" mysqld:/var/lib/mysql/server-cert.pem
              docker cp "${cert_dir}/server-key.pem" mysqld:/var/lib/mysql/server-key.pem
              docker exec mysqld sh -c 'chown mysql:mysql /var/lib/mysql/ca.pem /var/lib/mysql/server-cert.pem /var/lib/mysql/server-key.pem && chmod 644 /var/lib/mysql/ca.pem /var/lib/mysql/server-cert.pem && chmod 600 /var/lib/mysql/server-key.pem'
              mysql -h127.0.0.1 -uroot -e "ALTER INSTANCE RELOAD TLS"
              ;;
          esac
          
          USER_CREATION_COMMANDS=''
          WITH_PLUGIN=''

          if [ "$DB" == 'mysql:8.0' ]; then
            WITH_PLUGIN='with mysql_native_password'
            USER_CREATION_COMMANDS='
              CREATE USER
              user_sha256 IDENTIFIED WITH "sha256_password" BY "pass_sha256",
              nopass_sha256 IDENTIFIED WITH "sha256_password",
              user_caching_sha2 IDENTIFIED WITH "caching_sha2_password" BY "pass_caching_sha2",
              nopass_caching_sha2 IDENTIFIED WITH "caching_sha2_password"
              PASSWORD EXPIRE NEVER;
              GRANT RELOAD ON *.* TO user_caching_sha2;'
          elif [ "$DB" == 'mysql:8.4' ]; then
            WITH_PLUGIN='with caching_sha2_password'
            USER_CREATION_COMMANDS='
              CREATE USER
              user_caching_sha2 IDENTIFIED WITH "caching_sha2_password" BY "pass_caching_sha2",
              nopass_caching_sha2 IDENTIFIED WITH "caching_sha2_password"
              PASSWORD EXPIRE NEVER;
              GRANT RELOAD ON *.* TO user_caching_sha2;'
          fi
          
          if [ ! -z "$USER_CREATION_COMMANDS" ]; then
            mysql -uroot -h127.0.0.1 -e "$USER_CREATION_COMMANDS"
          fi
          
          mysql -h127.0.0.1 -uroot -e "create database $MYSQL_DATABASE DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci"
          mysql -h127.0.0.1 -uroot -e "create user $MYSQL_USER identified $WITH_PLUGIN by '${MYSQL_PASSWORD}'; grant all on ${MYSQL_DATABASE}.* to ${MYSQL_USER};"
          mysql -h127.0.0.1 -uroot -e "create user ${MYSQL_USER}@localhost identified $WITH_PLUGIN by '${MYSQL_PASSWORD}'; grant all on ${MYSQL_DATABASE}.* to ${MYSQL_USER}@localhost;"
      - name: Create db_credentials.json
        env:
          MYSQL_USER: tester
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: test_db
          MYSQL_HOST: 0.0.0.0
          MYSQL_PORT: 3306
        run: |
          set -e
          jq -n \
            --arg mysql_user "$MYSQL_USER" \
            --arg mysql_password "$MYSQL_PASSWORD" \
            --arg mysql_database "$MYSQL_DATABASE" \
            --arg mysql_host "$MYSQL_HOST" \
            --arg mysql_port $MYSQL_PORT \
            '$ARGS.named' > tests/db_credentials.json
      - name: Test with tox
        env:
          LEGACY_DB: ${{ matrix.legacy_db }}
          TOXENV: ${{ matrix.toxenv }}
        run: tox
      - name: Upload coverage to Codecov
        env:
          OS: ubuntu-latest
          PYTHON: ${{ matrix.py }}
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: techouse/sqlite3-to-mysql
          files: ./coverage.xml
          env_vars: OS,PYTHON
          verbose: true
      - name: Cleanup
        if: ${{ always() }}
        run: |
          rm -rf tests/db_credentials.json
